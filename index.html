<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Local Jisho Reader</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="container">
            <div class="top-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="margin: 0;">Clipboard to Jisho</h2>
                    <button id="toggle-btn" style="padding: 8px 16px; background: #d84315; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 180px;">Stop clipboard server</button>
                </div>
                <div id="output">Waiting for copied text...</div>
            </div>
            <div class="bottom-section">
                <iframe
                    name="jisho-frame"
                    id="jisho-frame"
                    src="https://jisho.org"
                    title="Jisho Embedded Window"
                ></iframe>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
